
name: Sincronizar Calendario Chankas

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sincronizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install
        working-directory: ./scripts

      - name: Sincronizar con Google Calendar
        run: node sync-calendar.js
        working-directory: ./scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          CALENDAR_ID_TAREAS: ${{ secrets.CALENDAR_ID_TAREAS }}
          CALENDAR_ID_FECHAS: ${{ secrets.CALENDAR_ID_FECHAS }}

      - name: Enviar notificaciones push
        run: node send-notifications.js
        working-directory: ./scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
